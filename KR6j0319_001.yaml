body:
  text: 北京淨住寺住持阿旺扎什譯納摩至尊聖救度佛母唵救度輪回答阿哷母以都答答阿哷脫八難一切病愆都哷救救度母前敬讚禮白淨蓮華之中間其上敷陳月輪座坐現金剛跏趺母施願母前致敬禮面如秋月光明相佛母身依皓魄輪一切莊嚴俱滿足持優鉢花前敬禮體相具圓十六歲一切正覺彼之子勝躬持施隨欲應敬禮救度聖母前皎潔白輪光色白八輻條上現八字而有普同旋轉相向具輪前至敬禮一切剎土皆清淨多寶花遍布其中誕生三世諸佛母是母尊前致敬禮聖母度母救度母增益壽母如意輪佛母尊前勇祈禱為消我等壽緣魔病及一切苦難中仗爾有能祈保護勝及通常諸成就為皆賜我盡無餘聖母尊前誠敬者彼常憶念悉如子尊前我亦致禱祝惟祈常持慈悲鉤佛母勝身如月色窈窕柔善體端嚴妙相俱著寶莊飾而以佳絹為裙裳蓮華月輪寶座上兩足金剛跏趺坐一面二臂具喜顏生三世諸佛之母佛母尊前常與跪今在尊前以微讚所為我等修道時從此以往至菩提消除其中諸逆緣願於順緣獲豐足唵答阿哷都答答阿哷都哷嘛嘛阿俞喇逋訥葉雜尼鴉阿納逋斯真沽嚕葉娑訶此呪遵御製大藏全呪校正書之此讚係西藏格隆羅卜藏薩木丹祈請二輩達喇嘛佛説于別蚌寺內落薩嶺堂中
